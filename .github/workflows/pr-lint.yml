---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint Code Base

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  Linter:
    name: PR Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # push lint autofix commits
      issues: write # comment lint results on issues
      packages: read # pull linter container images
      pull-requests: write # comment and annotate PRs
      statuses: write # set commit status checks

    steps:
      - name: Checkout repository
        # persist-credentials stays true: pr-lint pushes autofix commits
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true # zizmor: ignore[artipacked]

      - name: Run PR Lint
        # https://github.com/ivuorinen/actions
        uses: ivuorinen/actions/pr-lint@de31e11dda6488eabe95e951ebb61c6d9d500865 # v2026.06.30
        with:
          username: 'github-actions'
          email: 'github-actions@github.com'
          token: ${{ secrets.GITHUB_TOKEN }}
